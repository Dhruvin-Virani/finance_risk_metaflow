version: "3.8"

# Metaflow local stack — two containers only:
#   db        — postgres metadata store
#   metadata  — Metaflow API (port 8080) + UI (port 8083) bundled in one image
#
# First-time setup (build the image once):
#   DOCKER_BUILDKIT=1 docker build --build-arg TARGETARCH=amd64 \
#     -t metadata_service:latest /tmp/metaflow-service
#
# Start the stack:
#   docker-compose up -d
#
# Run your flow pointing at the service:
#   METAFLOW_DEFAULT_METADATA=service \
#   METAFLOW_SERVICE_URL=http://localhost:8080/ \
#   python3 flow.py run
#
# Open the UI:
#   http://localhost:8083

services:
  db:
    image: postgres:14
    container_name: mf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - mf_dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  metadata:
    image: metadata_service:latest
    container_name: mf_metadata
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"   # Metaflow metadata API  (used by flow.py)
      - "8082:8082"   # DB migration endpoint
      - "8083:8083"   # Metaflow UI  →  http://localhost:8083
    environment:
      MF_METADATA_DB_HOST: db
      MF_METADATA_DB_PORT: 5432
      MF_METADATA_DB_USER: postgres
      MF_METADATA_DB_PSWD: postgres
      MF_METADATA_DB_NAME: postgres
      MF_METADATA_PORT: 8080
      MF_METADATA_HOST: 0.0.0.0
      MF_MIGRATION_PORT: 8082
      MF_MIGRATION_ENDPOINTS_ENABLED: 1
      MF_UI_METADATA_PORT: 8083

volumes:
  mf_dbdata:
